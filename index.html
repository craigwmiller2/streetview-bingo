<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Street View Bingo — The Ultimate Explorer's Game</title>
        <style>
            :root {
                --primary-bg: #1a252f; /* Deepened for better contrast with canvas */
                --accent-color: #3498db;
                --success-color: #2ecc71;
                --text-main: #ffffff;
                --text-dim: #bdc3c7;
                --card-bg: rgba(26, 37, 47, 0.6); /* Higher opacity for readability */
            }

            body {
                font-family:
                    "Segoe UI",
                    system-ui,
                    -apple-system,
                    sans-serif;
                background-color: var(--primary-bg);
                margin: 0;
                overflow: hidden; /* Prevents scrollbars during animation */
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                text-align: center;
            }

            /* --- CANVAS STYLING --- */
            #background-canvas {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1; /* Sits behind everything */
                background: radial-gradient(circle at top right, #2c3e50, #1a252f);
            }

            .container {
                position: relative;
                z-index: 1;
                max-width: 500px;
                padding: 40px;
                background: var(--card-bg);
                backdrop-filter: blur(15px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 32px;
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
                margin: 20px;
                animation: fadeIn 1s ease-out;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .logo {
                width: 100%;
                max-width: 280px;
                filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
                margin-bottom: 10px;
            }

            .version-tag {
                display: inline-block;
                background: rgba(52, 152, 219, 0.2);
                border: 1px solid var(--accent-color);
                padding: 6px 16px;
                border-radius: 100px;
                font-size: 0.8rem;
                font-weight: 800;
                margin-bottom: 24px;
                color: #5dade2;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            h1 {
                font-size: 2.2rem;
                margin: 0;
                background: linear-gradient(to bottom, #ffffff, #95a5a6);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .tagline {
                font-size: 1.1rem;
                color: var(--text-dim);
                margin: 15px 0 35px 0;
                line-height: 1.5;
            }

            .btn {
                background: var(--success-color);
                color: white;
                padding: 20px 40px;
                text-decoration: none;
                border-radius: 18px;
                font-weight: 800;
                font-size: 1.2rem;
                display: inline-flex;
                align-items: center;
                gap: 12px;
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                box-shadow: 0 10px 25px rgba(46, 204, 113, 0.3);
            }

            .btn:hover {
                transform: scale(1.05);
                box-shadow: 0 15px 35px rgba(46, 204, 113, 0.5);
                background: #2ecc71;
            }

            .footer-note {
                margin-top: 30px;
                font-size: 0.9rem;
                color: var(--text-dim);
                opacity: 0.7;
            }
        </style>
    </head>
    <body>
        <canvas id="background-canvas"></canvas>

        <div class="container">
            <div class="version-tag">v1.8.1: MAYHEM MODE!</div>
            <img src="images/bingo-logo.png" alt="Bingo Logo" class="logo" />
            <p class="tagline">
                The world is your game board. Scour the globe and complete your grid in the premier scavenger hunt
                extension.
            </p>

            <a
                href="https://github.com/craigwmiller2/streetview-bingo/releases/latest/download/streetview-bingo.xpi"
                class="btn"
            >
                <span>Add to Firefox</span>
                <svg
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="3"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <path d="M5 12h14m-7-7 7 7-7 7" />
                </svg>
            </a>

            <div class="footer-note">
                Install on
                <strong>Firefox</strong>
                for the best experience.
            </div>
        </div>

        <script>
            const canvas = document.getElementById("background-canvas");
            const ctx = canvas.getContext("2d");
            let particles = [];
            const particleCount = 100;
            const connectionDistance = 160;
            const mouse = { x: null, y: null, radius: 150 };

            // --- NEW: Click Interaction ---
            window.addEventListener("mousedown", (e) => {
                mouse.x = e.x;
                mouse.y = e.y;

                particles.forEach((p) => {
                    const dx = p.x - mouse.x;
                    const dy = p.y - mouse.y;
                    const dist = Math.hypot(dx, dy);
                    const force = 1000 / dist; // The closer the particle, the stronger the push

                    if (dist < 300) {
                        // Impact radius
                        p.vx += (dx / dist) * force;
                        p.vy += (dy / dist) * force;
                    }
                });
            });

            window.addEventListener("mousemove", (e) => {
                mouse.x = e.x;
                mouse.y = e.y;
            });

            window.addEventListener("mouseout", () => {
                mouse.x = null;
                mouse.y = null;
            });

            function init() {
                resize();
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.6,
                        vy: (Math.random() - 0.5) * 0.6,
                        size: Math.random() * 2 + 1,
                        friction: 0.95, // Added to slow particles back down after a pulse
                    });
                }
            }

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];

                    // Mouse Attraction (Magnetic)
                    if (mouse.x !== null) {
                        let dx = mouse.x - p.x;
                        let dy = mouse.y - p.y;
                        let dist = Math.hypot(dx, dy);

                        if (dist < mouse.radius) {
                            const force = (mouse.radius - dist) / mouse.radius;
                            p.x += (dx / dist) * force * 1.5;
                            p.y += (dy / dist) * force * 1.5;

                            ctx.strokeStyle = `rgba(52, 152, 219, ${force * 0.3})`;
                            ctx.lineWidth = 0.8;
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.stroke();
                        }
                    }

                    // Apply friction to return to normal speed after a click
                    p.vx *= p.friction;
                    p.vy *= p.friction;

                    // Ensure they keep moving slightly even with friction
                    if (Math.abs(p.vx) < 0.2) p.vx += (Math.random() - 0.5) * 0.1;
                    if (Math.abs(p.vy) < 0.2) p.vy += (Math.random() - 0.5) * 0.1;

                    p.x += p.vx;
                    p.y += p.vy;

                    // Screen Wrap
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;

                    // Draw Particle
                    ctx.fillStyle = "rgba(52, 152, 219, 0.8)";
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();

                    // Standard Connections
                    for (let j = i + 1; j < particles.length; j++) {
                        let p2 = particles[j];
                        let dist = Math.hypot(p.x - p2.x, p.y - p2.y);

                        if (dist < connectionDistance) {
                            ctx.strokeStyle = `rgba(52, 152, 219, ${1 - dist / connectionDistance})`;
                            ctx.lineWidth = 0.5;
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(draw);
            }

            window.addEventListener("resize", () => {
                resize();
                init();
            });
            init();
            draw();
        </script>
    </body>
</html>
